name: FL Platform CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  PYTHON_VERSION: "3.11"
  FL_ENCRYPTION_KEY: "dGVzdF9rZXlfMzJieXRlc19wYWRkaW5nXzAwMDAwMCE="   # base64("test_key_32bytes_padding_000000!")
  JWT_SECRET: "ci_test_jwt_secret_not_for_production"

jobs:
  # ═══════════════════════════════════════════════════════
  # Job 1: Lint
  # ═══════════════════════════════════════════════════════
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install flake8
        run: pip install flake8 flake8-bugbear

      - name: Run flake8
        run: |
          flake8 shared/ server/ client/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E203 \
            --exclude=__pycache__,.git

  # ═══════════════════════════════════════════════════════
  # Job 2: Unit Tests
  # ═══════════════════════════════════════════════════════
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install -r tests/requirements-test.txt
          pip install -r server/requirements.txt
          pip install -r client/requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=. \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ═══════════════════════════════════════════════════════
  # Job 3: Docker Build (server)
  # ═══════════════════════════════════════════════════════
  docker-build:
    name: Docker Build (server)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: false
          tags: fl-platform-server:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════════════════════════
  # Job 4: Integration smoke test
  # ═══════════════════════════════════════════════════════
  integration:
    name: Integration Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install server dependencies
        run: |
          pip install --upgrade pip
          pip install -r server/requirements.txt
          pip install -r tests/requirements-test.txt

      - name: Start server in background
        run: |
          cd server
          python main.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5   # wait for startup

      - name: Health check
        run: |
          curl -sf http://localhost:8000/api/status | python -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok', d"
          echo "✅ Health check passed"

      - name: Register & login user
        run: |
          # Register
          curl -sf -X POST http://localhost:8000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"ci_user","password":"ci_pass","hospital_name":"CI Hospital","contact_email":"ci@test.com"}' \
            | python -c "import sys,json; d=json.load(sys.stdin); assert 'user_id' in d, d"

          # Login and capture token
          TOKEN=$(curl -sf -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"ci_user","password":"ci_pass"}' \
            | python -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          echo "TOKEN=$TOKEN" >> $GITHUB_ENV
          echo "✅ Auth passed"

      - name: List projects
        run: |
          curl -sf http://localhost:8000/api/projects \
            -H "Authorization: Bearer $TOKEN" \
            | python -c "import sys,json; d=json.load(sys.stdin); assert isinstance(d,list), d"
          echo "✅ Projects endpoint OK"

      - name: Shutdown server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
